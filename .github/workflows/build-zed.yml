name: Build Zed

on:
  workflow_dispatch:

permissions: 
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        repository: zed-industries/zed

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Add WASM target
      run: rustup target add wasm32-wasi

    - name: Install C++ build tools
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
        
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    - name: Run cargo
      run: cargo build --release

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: zed
        path: target\release\Zed.exe

    - name: Set date
      run: echo "CURRENT_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

    - name: Release Nightly
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/heads/auto-release')
      with:
        name: Nightly ${{ env.CURRENT_DATE }}
        body: Automated nightly release of Zed
        tag_name: nightly-${{ env.CURRENT_DATE }}
        prerelease: true
        files: |
          target\release\Zed.exe

    - name: Update Nightly Current
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/heads/auto-release')
      with:
        name: Nightly - Current
        body: This release always contains the newest nightly artifacts.
        tag_name: nightly-current
        prerelease: true
        files: |
          target\release\Zed.exe